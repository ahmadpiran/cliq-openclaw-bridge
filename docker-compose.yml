services:
  cliq-bridge:
    image: ${BRIDGE_IMAGE:-cliq-openclaw-bridge:local}
    container_name: cliq-bridge
    build:
      context: ${BRIDGE_BUILD_CONTEXT:-./cliq-openclaw-bridge}
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${BRIDGE_ENV_FILE:-.bridge.env}
    environment:
      OPENCLAW_BASE_URL: http://openclaw-gateway:18789
    volumes:
      - bridge-data:/data
      - ${OPENCLAW_WORKSPACE_DIR}:/data/openclaw-workspace:rw
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - cliq-bridge-net