services:
  bridge:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      # BoltDB must survive container restarts — never store it inside the container.
      - bridge-data:/data
      - ${OPENCLAW_CONFIG_DIR}:/data/openclaw:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  bridge-data:
    driver: local
